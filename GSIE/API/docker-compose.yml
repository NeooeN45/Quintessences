# GSIE API — Docker Compose (Phase 4, semaine 1)
# DEC-000019 : PostgreSQL+PostGIS, Redis, API FastAPI
#
# Les secrets sont lus depuis .env (non commité).
# Copier .env.example en .env et adapter les valeurs.
#
# Usage :
#   docker compose up -d          # démarrer tous les services
#   docker compose logs -f api    # suivre les logs API
#   docker compose down           # arrêter

services:
  # PostgreSQL 16 + PostGIS 3.4 + Apache AGE (graphe Cypher)
  # Image personnalisée construite depuis Dockerfile.db
  db:
    build:
      context: .
      dockerfile: Dockerfile.db
    environment:
      POSTGRES_USER: ${GSIE_DB_USER:-gsie}
      POSTGRES_PASSWORD: ${GSIE_DB_PASSWORD:?GSIE_DB_PASSWORD requis dans .env}
      POSTGRES_DB: ${GSIE_DB_NAME:-gsie}
      # Apache AGE requiert shared_preload_libraries
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    command: >
      postgres
      -c shared_preload_libraries=age
      -c search_path=ag_catalog,public,tiger
      -c max_connections=100
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - gsie_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gsie -d gsie"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    # Limites ressources (recommandation stress test)
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

  # Redis 7.2 — cache + Pub/Sub + WebSocket fan-out
  # Sécurisé : mot de passe, maxmemory, port interne uniquement
  redis:
    image: redis:7.2-alpine
    command: >
      redis-server
      --requirepass ${GSIE_REDIS_PASSWORD:?GSIE_REDIS_PASSWORD requis dans .env}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    expose:
      - "6379"
    environment:
      REDISCLI_AUTH: ${GSIE_REDIS_PASSWORD:?GSIE_REDIS_PASSWORD requis dans .env}
    volumes:
      - gsie_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  # API FastAPI — Gunicorn + UvicornWorker
  # Durcissement : read-only rootfs, no-new-privileges, cap_drop ALL
  # Context = racine du projet (le Dockerfile COPY des fichiers depuis GSIE/API/
  # et GSIE/ENGINES/EVIDENCE_ENGINE/rust/)
  api:
    build:
      context: ../..
      dockerfile: GSIE/API/Dockerfile
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      GSIE_ENVIRONMENT: ${GSIE_ENVIRONMENT:-development}
      GSIE_DEBUG: ${GSIE_DEBUG:-false}
      GSIE_LOG_LEVEL: ${GSIE_LOG_LEVEL:-INFO}
      GSIE_DATABASE_URL: postgresql+asyncpg://${GSIE_DB_USER:-gsie}:${GSIE_DB_PASSWORD}@db:5432/${GSIE_DB_NAME:-gsie}
      GSIE_REDIS_URL: redis://:${GSIE_REDIS_PASSWORD}@redis:6379/0
      GSIE_RATE_LIMIT_STORAGE_URL: redis://:${GSIE_REDIS_PASSWORD}@redis:6379/1
      GSIE_OTEL_ENABLED: ${GSIE_OTEL_ENABLED:-false}
      GSIE_RATE_LIMIT_ENABLED: ${GSIE_RATE_LIMIT_ENABLED:-true}
      # Auth JWT RS256 — clés montées depuis le host (générées via docker/generate-jwt-keys.sh)
      GSIE_JWT_PRIVATE_KEY_PATH: /keys/private.pem
      GSIE_JWT_PUBLIC_KEY_PATH: /keys/public.pem
      GSIE_AUTH_DEV_LOGIN_ENABLED: ${GSIE_AUTH_DEV_LOGIN_ENABLED:-true}
      GSIE_AUTH_DEV_USERNAME: ${GSIE_AUTH_DEV_USERNAME:-admin}
      GSIE_AUTH_DEV_PASSWORD: ${GSIE_AUTH_DEV_PASSWORD:?GSIE_AUTH_DEV_PASSWORD requis dans .env}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Clés JWT RS256 — montées en lecture seule depuis le host
      - ./keys:/keys:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    # Sécurité Docker (OWASP A05)
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # Limites ressources (recommandation stress test)
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 768M

networks:
  default:
    driver: bridge

volumes:
  gsie_pgdata:
  gsie_redisdata:
