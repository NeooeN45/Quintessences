# GSIE API — Docker Compose (Phase 4, semaine 1)
# DEC-000019 : PostgreSQL+PostGIS, Redis, API FastAPI
#
# Les secrets sont lus depuis .env (non commité).
# Copier .env.example en .env et adapter les valeurs.
#
# Usage :
#   docker compose up -d          # démarrer tous les services
#   docker compose logs -f api    # suivre les logs API
#   docker compose down           # arrêter

services:
  # PostgreSQL + PostGIS 3.4
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: ${GSIE_DB_USER:-gsie}
      POSTGRES_PASSWORD: ${GSIE_DB_PASSWORD:?GSIE_DB_PASSWORD requis dans .env}
      POSTGRES_DB: ${GSIE_DB_NAME:-gsie}
    ports:
      - "5432:5432"
    volumes:
      - gsie_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gsie -d gsie"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # Limites ressources (recommandation stress test)
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

  # Redis 7.2 — cache + Pub/Sub + WebSocket fan-out
  # Sécurisé : mot de passe, maxmemory, port interne uniquement
  redis:
    image: redis:7.2-alpine
    command: >
      redis-server
      --requirepass ${GSIE_REDIS_PASSWORD:?GSIE_REDIS_PASSWORD requis dans .env}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    expose:
      - "6379"
    volumes:
      - gsie_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${GSIE_REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  # API FastAPI — Gunicorn + UvicornWorker
  # Durcissement : read-only rootfs, no-new-privileges, cap_drop ALL
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      GSIE_ENVIRONMENT: ${GSIE_ENVIRONMENT:-development}
      GSIE_DEBUG: ${GSIE_DEBUG:-true}
      GSIE_LOG_LEVEL: ${GSIE_LOG_LEVEL:-INFO}
      GSIE_DATABASE_URL: postgresql+asyncpg://${GSIE_DB_USER:-gsie}:${GSIE_DB_PASSWORD}@db:5432/${GSIE_DB_NAME:-gsie}
      GSIE_REDIS_URL: redis://:${GSIE_REDIS_PASSWORD}@redis:6379/0
      GSIE_OTEL_ENABLED: ${GSIE_OTEL_ENABLED:-false}
      GSIE_RATE_LIMIT_ENABLED: ${GSIE_RATE_LIMIT_ENABLED:-true}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    # Sécurité Docker (OWASP A05)
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # Limites ressources (recommandation stress test)
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M

volumes:
  gsie_pgdata:
  gsie_redisdata:
