name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  markdown-lint:
    name: Lint Markdown
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22.22.2"

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli@0.49.1

      - name: Lint markdown corpus against the migration baseline
        run: |
          find . -name '*.md' \
            -not -path './.claude/skills/*' \
            -not -path './node_modules/*' \
            -not -path './.git/*' \
            -print0 | xargs -0 markdownlint --config .markdownlint.json

      - name: Lint newly added markdown files strictly
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          if [[ -n "$BASE_SHA" && "$BASE_SHA" != "0000000000000000000000000000000000000000" ]] \
            && git cat-file -e "$BASE_SHA^{commit}"; then
            git diff --name-only --diff-filter=A -z "$BASE_SHA" HEAD -- '*.md' \
              | xargs -0 -r markdownlint --config .markdownlint-strict.json
          else
            git ls-files -z '*.md' \
              | xargs -0 -r markdownlint --config .markdownlint-strict.json
          fi

  consistency-checks:
    name: Consistency Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Validate source-of-truth registry
        run: |
          python tools/check_source_of_truth.py
          python -m unittest discover -s tools/tests -p "test_*.py"
          python tools/check_ai_prompts.py
          python tools/check_build_consistency.py

      - name: Compile governance tools
        run: python -m compileall -q tools

      - name: Check line endings (LF only)
        run: |
          # Vérifie qu'aucun fichier texte n'a de CRLF dans le dépôt
          if grep -rlU $'\r' --include='*.md' --include='*.py' --include='*.sh' --include='*.yml' --include='*.yaml' --include='*.json' . ; then
            echo "::error::CRLF line endings detected. Run 'git add --renormalize .' locally."
            exit 1
          fi

      - name: Check for trailing whitespace
        run: |
          if grep -rn '[[:space:]]$' --include='*.md' . | grep -v '.claude/skills/' ; then
            echo "::warning::Trailing whitespace detected in markdown files."
            grep -rn '[[:space:]]$' --include='*.md' . | grep -v '.claude/skills/' || true
          fi

      - name: Check LICENSE exists
        run: |
          if [ ! -f LICENSE ]; then
            echo "::error::LICENSE file is missing."
            exit 1
          fi

      - name: Check no secrets in tracked files
        run: |
          # Scan basique pour des patterns de secrets courants
          if grep -rnE '(ghp_[a-zA-Z0-9]{36}|gho_[a-zA-Z0-9]{36}|sk-[a-zA-Z0-9]{20}|AKIA[0-9A-Z]{16})' \
            --include='*.md' --include='*.py' --include='*.sh' --include='*.yml' --include='*.json' \
            . | grep -v '.git/' ; then
            echo "::error::Potential secret detected in tracked files!"
            exit 1
          fi

      - name: Check French language in documentation
        run: |
          # Vérifie que les documents GSIE principaux sont bien en français
          # (présence d'accents ou de mots-clés français)
          for f in README.md CLAUDE.md ROADMAP.md PROJECT_MEMORY.md CHANGELOG.md; do
            if [ -f "$f" ]; then
              if ! grep -qP '[àâäéèêëïîôöùûüç]' "$f" && ! grep -qi 'phase\|fondateur\|constitution' "$f"; then
                echo "::warning::$f might not be in French."
              fi
            fi
          done

      - name: Check constitution articles status
        run: |
          # Vérifie qu'aucun article constitutionnel n'est en statut "Draft"
          # après la clôture de la Phase 1
          for f in 00_CONSTITUTION/GSIE-CON-0*.md; do
            if [ -f "$f" ]; then
              if grep -qi 'statut.*draft\|statut.*à valider' "$f"; then
                echo "::warning::$f still in Draft/À valider status."
              fi
            fi
          done

  python-quality:
    name: Python lint + type + test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: GSIE/API
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: "3.12"

      - name: Install locked dependencies
        run: |
          uv lock --check
          uv sync --locked --extra dev

      - name: Lint with Ruff
        run: |
          uv run ruff check src tests
          uv run ruff format --check src tests

      - name: Type check with mypy
        run: uv run mypy src --strict

      - name: Test with pytest
        run: uv run pytest tests/unit --cov=gsie_api --cov-report=term-missing --cov-fail-under=80

  python-integration:
    name: Python integration tests (PostGIS + Redis)
    runs-on: ubuntu-latest
    needs: [python-quality]
    timeout-minutes: 25
    defaults:
      run:
        working-directory: GSIE/API
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: "3.12"

      - name: Install locked dependencies
        run: uv sync --locked --extra dev

      - name: Run integration tests (testcontainers — Docker requis)
        run: uv run pytest tests/integration -q --tb=short -v
        env:
          # testcontainers utilise le socket Docker de l'hôte (déjà disponible sur ubuntu-latest)
          TESTCONTAINERS_RYUK_DISABLED: "true"

  rust-quality:
    name: Rust clippy + test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: GSIE/ENGINES/EVIDENCE_ENGINE/rust
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@8641a17e25bf5b40c118d48fe0f81e8655731839 # 1.85.0
        with:
          components: clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: GSIE/ENGINES/EVIDENCE_ENGINE/rust

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --all-targets

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [python-quality, rust-quality]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build Docker image
        run: docker build -f GSIE/API/Dockerfile --tag gsie-api:ci .

  governance-check:
    name: Governance Guard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0

      - name: Check no Locked documents modified without RFC
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          LOCKED_FILES=(
            "00_CONSTITUTION/GSIE-FND-001.md"
            "00_CONSTITUTION/GSIE-FND-002.md"
            "00_CONSTITUTION/GSIE-CON-000.md"
          )
          if [[ -n "$BASE_SHA" && "$BASE_SHA" != "0000000000000000000000000000000000000000" ]] \
            && git cat-file -e "$BASE_SHA^{commit}"; then
            CHANGED_FILES="$(git diff --name-only "$BASE_SHA" HEAD)"
            if printf '%s\n' "$CHANGED_FILES" \
              | grep -Fxq -f <(printf '%s\n' "${LOCKED_FILES[@]}"); then
              if ! printf '%s\n' "$CHANGED_FILES" | grep -qE '^02_RFC/RFC-.*\.md$'; then
                echo "::error::Un document Locked a changé sans RFC associé."
                exit 1
              fi
            fi
          fi

          for f in "${LOCKED_FILES[@]}"; do
            if [ -f "$f" ]; then
              if ! head -10 "$f" | grep -qi 'locked'; then
                echo "::error::$f doit porter le statut Locked dans son en-tête."
                exit 1
              fi
            fi
          done

      - name: Check DEC files have required fields
        run: |
          for f in 03_DECISIONS/DEC-*.md; do
            if [ -f "$f" ]; then
              if ! grep -qi '\*\*ID\*\*' "$f"; then
                echo "::error::$f missing required ID field."
                exit 1
              fi
              if ! grep -qi '\*\*Statut\*\*' "$f"; then
                echo "::error::$f missing required Statut field."
                exit 1
              fi
              if ! grep -qiE '\*\*Décideur(s)?\*\*' "$f"; then
                echo "::error::$f missing required Décideur/Décideurs field."
                exit 1
              fi
            fi
          done

  # Job gate — bloque les merges si un job obligatoire échoue
  ci-gate:
    name: CI Gate (bloque merge)
    runs-on: ubuntu-latest
    needs: [markdown-lint, consistency-checks, python-quality, python-integration, rust-quality, docker-build, governance-check]
    timeout-minutes: 5
    if: always()
    steps:
      - name: Vérifier que tous les jobs obligatoires ont réussi
        run: |
          echo "Jobs status:"
          echo "  markdown-lint: ${{ needs.markdown-lint.result }}"
          echo "  consistency-checks: ${{ needs.consistency-checks.result }}"
          echo "  python-quality: ${{ needs.python-quality.result }}"
          echo "  python-integration: ${{ needs.python-integration.result }}"
          echo "  rust-quality: ${{ needs.rust-quality.result }}"
          echo "  docker-build: ${{ needs.docker-build.result }}"
          echo "  governance-check: ${{ needs.governance-check.result }}"
          if [[ "${{ needs.markdown-lint.result }}" != "success" || \
                "${{ needs.consistency-checks.result }}" != "success" || \
                "${{ needs.python-quality.result }}" != "success" || \
                "${{ needs.python-integration.result }}" != "success" || \
                "${{ needs.rust-quality.result }}" != "success" || \
                "${{ needs.docker-build.result }}" != "success" || \
                "${{ needs.governance-check.result }}" != "success" ]]; then
            echo "::error::Un ou plusieurs jobs CI ont échoué — merge bloqué."
            exit 1
          fi
          echo "Tous les jobs CI ont réussi — merge autorisé."
